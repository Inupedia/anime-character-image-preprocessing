name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
          - os: macos-13
            name: macos-x64
          - os: macos-latest
            name: macos-arm64
          - os: ubuntu-latest
            name: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare config
        shell: bash
        run: cp module/config_temp.py module/config.py

      - name: Build with PyInstaller
        run: pyinstaller AnimePreprocessing.spec --noconfirm

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf ../AnimePreprocessing-${{ matrix.name }}.tar.gz AnimePreprocessing/

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\AnimePreprocessing -DestinationPath AnimePreprocessing-${{ matrix.name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimePreprocessing-${{ matrix.name }}
          path: |
            AnimePreprocessing-${{ matrix.name }}.tar.gz
            AnimePreprocessing-${{ matrix.name }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
